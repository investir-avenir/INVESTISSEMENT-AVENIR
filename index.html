<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Investissement & Avenir Europe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Verrouillage strict du défilement pour l'inscription */
        html, body { 
            height: 100%; 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Inter', sans-serif;
        }

        .step-page { 
            display: none; 
            height: 100vh; 
            width: 100vw; 
            flex-direction: column; 
            padding: 25px; 
            justify-content: space-between;
            box-sizing: border-box;
        }
        .active { display: flex; }

        /* Inputs Professionnels */
        input, select { 
            background: #121212!important; 
            border: 1px solid #222!important; 
            color: #fff!important; 
            border-radius: 12px!important; 
            padding: 14px!important; 
            width: 100%; 
            outline: none;
            font-size: 15px;
        }

        .gold-btn { 
            background: linear-gradient(135deg, #d4af37 0%, #f1d592 100%); 
            color: #000; 
            font-weight: 800; 
            padding: 16px; 
            border-radius: 14px; 
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 20px; /* Remonté comme demandé */
        }

        /* Dashboard avec Scroll pour les 300 projets */
        #page-dashboard { overflow-y: auto; display: none; height: 100vh; background: #f4f7f6; color: #111; padding: 0; }
        #page-dashboard.active { display: block; }

        /* Cartes de Projets en Texte/Couleurs */
        .project-card { background: white; border-radius: 20px; margin: 15px; overflow: hidden; border: 1px solid #eee; }
        .project-visual { 
            height: 140px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            text-align: center;
            padding: 15px;
        }
        .project-visual i { font-size: 40px; margin-bottom: 10px; opacity: 0.9; }
        .project-visual span { font-weight: 900; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }

        .loader-screen {
            display: none; position: fixed; inset: 0; background: #000; z-index: 10000;
            flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="loader" class="loader-screen">
        <div class="w-10 h-10 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
        <p id="loader-text" class="text-yellow-500 font-bold text-[10px] mt-6 uppercase tracking-widest text-center px-10">Sécurisation européenne...</p>
    </div>

    <div id="page-welcome" class="step-page active">
        <div class="mt-16 text-center">
            <div class="w-16 h-16 bg-yellow-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-yellow-500/20">
                <i class="fa-solid fa-shield-halved text-black text-2xl"></i>
            </div>
            <h1 class="text-3xl font-black text-white italic">INVESTISSEMENT<br>& AVENIR <span class="text-yellow-500">EU</span></h1>
        </div>
        <button onclick="goTo('page-step1')" class="gold-btn w-full">Démarrer l'inscription</button>
    </div>

    <div id="page-step1" class="step-page">
        <div>
            <h2 class="text-xl font-bold text-yellow-500 uppercase mt-6">Localisation</h2>
            <div class="mt-8 space-y-4">
                <label class="text-[10px] text-gray-500 uppercase font-bold px-2">Nationalité Européenne</label>
                <select id="nat-select"></select>
                <label class="text-[10px] text-gray-500 uppercase font-bold px-2">Pays de Résidence</label>
                <select id="res-select"></select>
            </div>
        </div>
        <button onclick="goTo('page-step2')" class="gold-btn w-full">Suivant</button>
    </div>

    <div id="page-step2" class="step-page">
        <div>
            <h2 class="text-xl font-bold text-yellow-500 uppercase mt-6">Coordonnées</h2>
            <div class="mt-8 space-y-4">
                <input type="text" placeholder="Prénom et Nom">
                <input type="email" placeholder="Adresse Email">
                <input type="tel" placeholder="Numéro de téléphone">
            </div>
        </div>
        <button onclick="startCreation()" class="gold-btn w-full">Créer mon compte Europe</button>
    </div>

    <div id="page-dashboard" class="step-page">
        <div class="p-6 bg-white border-b sticky top-0 z-50 flex justify-between items-center shadow-sm">
            <h3 class="font-black italic text-lg text-slate-800">I&A <span class="text-yellow-600">EUROPE</span></h3>
            <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400"><i class="fa-solid fa-user"></i></div>
        </div>

        <div class="p-4">
            <div class="bg-slate-900 rounded-[35px] p-8 text-white shadow-2xl mb-8">
                <p class="text-[10px] uppercase text-slate-500 font-bold tracking-widest">Solde du compte</p>
                <h2 class="text-4xl font-black mt-2">0,00 €</h2>
                <div class="flex gap-3 mt-8">
                    <button class="bg-white text-black text-[10px] font-black py-4 rounded-xl flex-1 uppercase">Déposer</button>
                    <button class="bg-slate-800 text-slate-400 text-[10px] font-black py-4 rounded-xl flex-1 uppercase">Retrait</button>
                </div>
            </div>

            <h4 class="font-black text-xs uppercase tracking-widest px-2 mb-6 flex items-center gap-2">
                <i class="fa-solid fa-euro-sign text-yellow-600"></i> Projets Européens Actifs
            </h4>
            <div id="project-list"></div>
        </div>
        
        <div class="h-24"></div>
        <div class="fixed bottom-0 w-full bg-white border-t flex justify-around p-5 z-50">
            <i class="fa-solid fa-house text-yellow-600 text-xl"></i>
            <i class="fa-solid fa-chart-line text-slate-300 text-xl"></i>
            <i class="fa-solid fa-wallet text-slate-300 text-xl"></i>
        </div>
    </div>
</div>

<script>
    const PAYS_EU = [
        "Allemagne", "Autriche", "Belgique", "Bulgarie", "Chypre", "Croatie", "Danemark", "Espagne", 
        "Estonie", "Finlande", "France", "Grèce", "Hongrie", "Irlande", "Italie", "Lettonie", 
        "Lituanie", "Luxembourg", "Malte", "Pays-Bas", "Pologne", "Portugal", "République Tchèque", 
        "Roumanie", "Slovaquie", "Slovénie", "Suède", "Suisse", "Monaco", "Norvège"
    ];

    const THEMES = [
        { icon: "fa-building", color: "linear-gradient(135deg, #1e293b, #334155)", label: "IMMOBILIER" },
        { icon: "fa-leaf", color: "linear-gradient(135deg, #065f46, #059669)", label: "ÉCOLOGIE" },
        { icon: "fa-bolt", color: "linear-gradient(135deg, #1e40af, #3b82f6)", label: "ÉNERGIE" },
        { icon: "fa-microchip", color: "linear-gradient(135deg, #4c1d95, #7c3aed)", label: "TECH" },
        { icon: "fa-wine-glass", color: "linear-gradient(135deg, #7c2d12, #b91c1c)", label: "VITICULTURE" }
    ];

    // Remplissage des pays
    const populatePays = () => {
        const selects = [document.getElementById('nat-select'), document.getElementById('res-select')];
        selects.forEach(s => {
            PAYS_EU.sort().forEach(p => {
                let opt = document.createElement('option');
                opt.value = p; opt.innerText = p;
                s.appendChild(opt);
            });
        });
    };
    populatePays();

    function goTo(id) {
        document.querySelectorAll('.step-page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startCreation() {
        document.getElementById('loader').style.display = 'flex';
        const msgs = ["Vérification Européenne...", "Validation IBAN...", "Sécurisation KYC...", "Prêt !"];
        let i = 0;
        const interval = setInterval(() => { 
            if(i < msgs.length) document.getElementById('loader-text').innerText = msgs[i++]; 
        }, 3500);

        setTimeout(() => {
            clearInterval(interval);
            document.getElementById('loader').style.display = 'none';
            render300Projects();
            goTo('page-dashboard');
        }, 15000);
    }

    function render300Projects() {
        const container = document.getElementById('project-list');
        let html = '';
        for(let i=1; i<=300; i++) {
            const theme = THEMES[i % THEMES.length];
            const pays = PAYS_EU[i % PAYS_EU.length];
            html += `
                <div class="project-card">
                    <div class="project-visual" style="background: ${theme.color}">
                        <i class="fa-solid ${theme.icon}"></i>
                        <span>${theme.label}</span>
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-2">
                            <h5 class="font-black text-sm text-slate-800">Projet Européen #${1000 + i}</h5>
                            <span class="text-green-600 font-black text-xs">+${(Math.random() * 5 + 7).toFixed(1)}%</span>
                        </div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest"><i class="fa-solid fa-location-dot mr-1"></i> ${pays}</p>
                        <button class="w-full mt-4 bg-slate-50 text-slate-800 py-3 rounded-xl font-black text-[9px] uppercase border border-slate-100">Investir</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }
</script>

</body>
</html>
