<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investissement & Avenir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #f1d592 100%); color: #000; font-weight: 800; }
        .step-page { display: none; min-h-screen; flex-direction: column; padding: 24px; }
        .step-page.active { display: flex; }
        input { background: #111!important; border: 1px solid #333!important; color: white!important; border-radius: 16px!important; padding: 18px!important; width: 100%; margin-bottom: 16px; outline: none; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; color: #888; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div id="app">
    <div id="page-welcome" class="step-page active items-center justify-center text-center">
        <div class="w-20 h-20 gold-btn rounded-3xl flex items-center justify-center mb-6 shadow-2xl">
            <i class="fa-solid fa-shield-halved text-3xl"></i>
        </div>
        <h1 class="text-2xl font-black uppercase tracking-widest mb-10">Investissement <br><span class="text-yellow-500">&</span> Avenir</h1>
        <button onclick="goTo('page-auth')" class="gold-btn w-full max-w-xs py-5 rounded-2xl mb-4 uppercase">Créer un compte</button>
        <button onclick="goTo('page-login')" class="w-full max-w-xs py-5 rounded-2xl border border-white/20 uppercase font-bold text-sm">Se connecter</button>
    </div>

    <div id="page-auth" class="step-page">
        <button onclick="goTo('page-welcome')" class="mb-8 text-gray-500 text-sm font-bold"><i class="fa-solid fa-arrow-left mr-2"></i> RETOUR</button>
        <h2 class="text-2xl font-black mb-2">Identifiants</h2>
        <p class="text-gray-500 text-sm mb-8 italic">Étape 1 sur 2 : Sécurité du compte</p>
        
        <input type="email" id="reg-email" placeholder="Email ou Numéro de téléphone">
        <input type="password" id="reg-pass" placeholder="Mot de passe">
        
        <button onclick="goTo('page-info')" class="gold-btn w-full py-5 rounded-2xl mt-auto uppercase">Continuer</button>
    </div>

    <div id="page-info" class="step-page">
        <button onclick="goTo('page-auth')" class="mb-8 text-gray-500 text-sm font-bold"><i class="fa-solid fa-arrow-left mr-2"></i> RETOUR</button>
        <h2 class="text-2xl font-black mb-2">Informations</h2>
        <p class="text-gray-500 text-sm mb-8 italic">Étape 2 sur 2 : Identité du titulaire</p>
        
        <input type="text" id="reg-prenom" placeholder="Prénom">
        <input type="text" id="reg-nom" placeholder="Nom">
        <input type="text" id="reg-addr" placeholder="Adresse complète (ex: 4 rue de la Tour...)">
        
        <button onclick="handleRegister()" id="btn-finish" class="gold-btn w-full py-5 rounded-2xl mt-auto uppercase">Finaliser mon compte</button>
    </div>

    <div id="page-dashboard" class="step-page bg-[#f8f9fb] text-black !p-0">
        <div class="bg-white p-8 rounded-b-[45px] shadow-sm mb-6">
            <div class="flex justify-between items-center mb-10">
                <div class="w-10 h-10 gold-btn rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-crown"></i></div>
                <p id="user-name" class="font-bold text-sm text-gray-800 tracking-tight">--</p>
            </div>
            <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-1">Portefeuille Total</p>
            <div class="flex items-baseline gap-2 mb-8">
                <h1 id="user-balance" class="text-5xl font-black tracking-tighter">0,00</h1>
                <span class="text-2xl font-bold text-gray-300">€</span>
            </div>
            <button class="bg-black text-white px-10 py-4 rounded-2xl font-black text-xs tracking-widest">+ RECHARGER</button>
        </div>

        <div class="p-6">
            <h3 class="font-black text-xs uppercase tracking-widest text-gray-400 mb-4">Mes Informations de dépôt</h3>
            <div class="bg-white rounded-[32px] p-6 shadow-sm border border-gray-100">
                <div class="space-y-4 text-[11px]">
                    <div class="flex justify-between border-b border-gray-50 pb-3"><span class="text-gray-400">IBAN</span><span class="font-bold text-yellow-600">FR76 3000 6000 ...</span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Adresse</span><span id="user-addr" class="font-bold text-right w-2/3">--</span></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD1Yhvo8ooS9nTb_RRP7Pswjqovj2T6ZOU",
      authDomain: "invest-avenir.firebaseapp.com",
      databaseURL: "https://invest-avenir-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "invest-avenir",
      storageBucket: "invest-avenir.firebasestorage.app",
      messagingSenderId: "109431023120",
      appId: "1:109431023120:web:469c6c2cb0d027a3180c95"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Fonction pour changer de page
    window.goTo = (id) => {
        document.querySelectorAll('.step-page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    // Logique d'inscription finale
    window.handleRegister = async () => {
        const btn = document.getElementById('btn-finish');
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;
        const prenom = document.getElementById('reg-prenom').value;
        const nom = document.getElementById('reg-nom').value;
        const addr = document.getElementById('reg-addr').value;

        if(!email || !pass || !prenom) return alert("Veuillez remplir tous les champs");
        btn.innerText = "CRÉATION EN COURS...";

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            const userData = { prenom, nom, addr, balance: "0,00" };
            
            await setDoc(doc(db, "users", userCredential.user.uid), userData);
            
            // Affichage dans le dashboard
            document.getElementById('user-name').innerText = prenom + " " + nom;
            document.getElementById('user-addr').innerText = addr;
            goTo('page-dashboard');
            
        } catch (e) { 
            alert("Erreur : " + e.message); 
            btn.innerText = "FINALISER MON COMPTE"; 
        }
    };
</script>
</body>
</html>
